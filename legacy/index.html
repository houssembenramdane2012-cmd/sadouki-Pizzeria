<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sadouki-Pizzeria</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style id="dynamic-theme">
        :root {
            --primary-color: #d4af37;
            --bg-dark: #0a0a0a;
            --surface-dark: #151515;
            --text-dark: #ffffff;
            --text-muted-dark: #aaaaaa;
            
            --bg-light: #f8f9fa;
            --surface-light: #ffffff;
            --text-light: #111111;
            --text-muted-light: #666666;

            --current-bg: var(--bg-dark);
            --current-surface: var(--surface-dark);
            --current-text: var(--text-dark);
            --current-muted: var(--text-muted-dark);
            --border-color: rgba(212, 175, 55, 0.2);
            --danger-color: #ef4444;
            --success-color: #10b981;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            --input-bg: rgba(0,0,0,0.3);
        }

        body.light-mode {
            --current-bg: var(--bg-light);
            --current-surface: var(--surface-light);
            --current-text: var(--text-light);
            --current-muted: var(--text-muted-light);
            --border-color: rgba(0, 0, 0, 0.1);
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            --input-bg: #f1f5f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--current-bg);
            color: var(--current-text);
            transition: background-color 0.4s, color 0.4s;
            padding-bottom: 90px;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 15px; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0 20px; margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .restaurant-title { font-size: 22px; font-weight: 800; color: var(--primary-color); }

        .btn {
            background-color: var(--primary-color); color: #000; border: none;
            padding: 10px 15px; border-radius: 8px; font-weight: 800; font-size: 14px;
            cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background-color: var(--current-surface); color: var(--current-text); border: 1px solid var(--border-color); }
        .btn-danger { background-color: var(--danger-color); color: #fff; }
        .btn-success { background-color: var(--success-color); color: #fff; }

        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }

        .item-card {
            background-color: var(--current-surface); border: 1px solid var(--border-color);
            border-radius: 12px; overflow: hidden; box-shadow: var(--shadow);
            display: flex; flex-direction: column; transition: transform 0.3s, border-color 0.3s;
        }
        .item-card:hover { border-color: var(--primary-color); transform: translateY(-3px); }
        
        .item-image { width: 100%; height: 140px; object-fit: cover; border-bottom: 1px solid var(--border-color); }
        
        .item-image-placeholder {
            width: 100%; height: 140px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; background: var(--input-bg); border-bottom: 1px solid var(--border-color);
        }

        .item-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        .item-name { font-size: 16px; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }

        .size-options { display: flex; gap: 6px; margin-bottom: 10px; }
        .size-pill {
            flex: 1; text-align: center; background: var(--input-bg); border: 1px solid var(--border-color);
            padding: 6px 2px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px;
            color: var(--current-muted); transition: all 0.2s;
        }
        .size-pill.active { background: rgba(212, 175, 55, 0.15); border-color: var(--primary-color); color: var(--primary-color); }

        .extras-section { margin-bottom: 10px; }
        .extras-title { font-size: 13px; font-weight: 800; color: var(--primary-color); margin-bottom: 6px; }
        
        .check-item {
            display: flex; align-items: center; justify-content: space-between; padding: 6px 8px;
            background: var(--input-bg); border-radius: 6px; margin-bottom: 6px; font-size: 12px;
            border: 1px solid transparent; transition: 0.2s; cursor: pointer;
        }
        .check-item:hover { border-color: var(--border-color); }
        .check-item input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--primary-color); }

        .item-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px dashed var(--border-color); }
        .price-tag { font-size: 16px; font-weight: 800; color: var(--primary-color); }

        .form-group { margin-bottom: 15px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 700; color: var(--current-muted); font-size: 13px;}
        .form-control {
            width: 100%; padding: 12px; background-color: var(--input-bg);
            border: 1px solid var(--border-color); color: var(--current-text);
            border-radius: 10px; font-size: 14px; outline: none; transition: border 0.3s;
        }
        .form-control:focus { border-color: var(--primary-color); }
        
        .row-inputs { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }

        .admin-card { background: var(--current-surface); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; margin-bottom: 20px; }
        .admin-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
        .admin-tabs::-webkit-scrollbar { display: none; }
        .tab-btn { background: var(--current-surface); border: 1px solid var(--border-color); color: var(--current-muted); padding: 10px 15px; border-radius: 20px; white-space: nowrap; font-weight: 700; font-size: 13px; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary-color); color: #000; border-color: var(--primary-color); }
        .admin-section { display: none; animation: fadeIn 0.4s; }
        .admin-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .floating-cart {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: var(--primary-color); color: #000; padding: 12px 25px;
            border-radius: 25px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
            display: flex; justify-content: space-between; align-items: center; width: 90%; max-width: 350px;
            z-index: 100; cursor: pointer; font-weight: 800; font-size: 14px; transition: transform 0.3s;
        }
        .floating-cart:active { transform: translateX(-50%) scale(0.95); }
        .cart-badge { background: #000; color: var(--primary-color); padding: 2px 8px; border-radius: 15px; margin-right: 8px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--current-surface); width: 95%; max-width: 450px; border-radius: 20px; padding: 20px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .close-btn { background: none; border: none; font-size: 24px; color: var(--current-muted); cursor: pointer; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: #222; color: white; padding: 12px 25px; border-radius: 25px; font-weight: 700; font-size: 14px; z-index: 2000; transition: transform 0.3s; opacity: 0; border: 1px solid var(--primary-color); }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .color-picker-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 8px; background: var(--input-bg); border-radius: 8px;}
        .color-picker-group input[type="color"] { width: 40px; height: 35px; border: none; border-radius: 5px; cursor: pointer; background: none;}
        
        @media (min-width: 768px) { .admin-grid-desktop { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; } }

        @media (max-width: 600px) {
            .items-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .item-card { border-radius: 10px; }
            .item-image { height: 90px; }
            .item-image-placeholder { height: 90px; font-size: 35px; }
            .item-content { padding: 8px; }
            .item-name { font-size: 13px; margin-bottom: 8px; }
            .size-options { gap: 4px; margin-bottom: 8px; }
            .size-pill { padding: 4px 2px; font-size: 10px; border-radius: 6px; }
            .extras-section { margin-bottom: 8px; }
            .extras-title { font-size: 11px; margin-bottom: 4px; }
            .check-item { padding: 4px 6px; font-size: 10px; margin-bottom: 4px; border-radius: 6px; }
            .check-item input[type="checkbox"] { width: 12px; height: 12px; }
            .price-tag { font-size: 13px; }
            .btn { padding: 6px 8px; font-size: 11px; border-radius: 6px; }
            .item-footer { padding-top: 8px; }
        }
    </style>
</head>
<body>

    <div id="toast">رسالة</div>

    <div id="customer-view" class="container">
        <header>
            <div>
                <h1 id="restaurant-main-title" class="restaurant-title">sadouki</h1>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-secondary" onclick="toggleTheme()" style="padding: 8px; border-radius: 8px;" title="تبديل المظهر">🌓</button>
                <button class="btn btn-secondary" onclick="switchView('login-view')" style="padding: 8px; border-radius: 8px;" title="الإدارة">⚙️</button>
            </div>
        </header>

        <div class="form-group" style="margin-bottom: 20px;">
            <input type="text" id="customer-search" class="form-control" placeholder="🔍 ابحث عن طبقك المفضل..." oninput="renderCustomerMenu()" style="font-size: 13px;">
        </div>

        <div id="menu-container"></div>

        <div class="floating-cart" id="floating-cart" onclick="openCartModal()" style="display: none;">
            <div>🛒 إتمام الطلب <span class="cart-badge" id="cart-count">0</span></div>
            <div id="cart-total-float">0 دج</div>
        </div>
    </div>

    <div class="modal-overlay" id="cart-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 style="color: var(--primary-color); font-size: 18px;">🛒 سلة الطلبات</h2>
                <button class="close-btn" onclick="closeModal('cart-modal')">×</button>
            </div>
            <div id="cart-items-list" style="margin-bottom: 15px; max-height: 200px; overflow-y: auto;"></div>
            
            <div class="form-group">
                <label class="form-label">طريقة الاستلام</label>
                <div style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <button type="button" id="type-delivery" class="btn" style="flex: 1; padding: 8px;" onclick="setOrderType('delivery')">🛵 توصيل</button>
                    <button type="button" id="type-pickup" class="btn btn-secondary" style="flex: 1; padding: 8px;" onclick="setOrderType('pickup')">🏪 من المتجر</button>
                </div>
                <input type="hidden" id="order-type" value="delivery">
            </div>

            <div style="border-top: 1px dashed var(--border-color); padding-top: 10px; margin-bottom: 15px; font-size: 13px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 4px;"><span style="color: var(--current-muted)">المجموع:</span> <span id="cart-subtotal">0 دج</span></div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;"><span style="color: var(--current-muted)">رسوم التوصيل:</span> <span id="cart-delivery">0 دج</span></div>
                <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 18px; color: var(--primary-color);"><span>الإجمالي:</span> <span id="cart-final-total">0 دج</span></div>
            </div>
            <div class="form-group"><input type="text" id="order-name" class="form-control" placeholder="الاسم الكريم"></div>
            <div class="form-group"><input type="tel" id="order-phone" class="form-control" placeholder="رقم الهاتف (مثال: 05xx)"></div>
            <div class="form-group" id="order-address-group"><input type="text" id="order-address" class="form-control" placeholder="العنوان بالتفصيل"></div>
            <button class="btn" style="width: 100%; padding: 12px; font-size: 16px;" onclick="submitOrder()">🚀 تأكيد وإرسال الطلب</button>
        </div>
    </div>

    <div id="login-view" class="container" style="display: none;">
        <div class="admin-card" style="max-width: 400px; margin: 60px auto; text-align: center;">
            <h2 style="color: var(--primary-color); margin-bottom: 20px;">الإدارة 🔒</h2>
            <div class="form-group" style="text-align: right;"><input type="password" id="login-password" class="form-control" placeholder="أدخل كلمة المرور..."></div>
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="checkLogin()">دخول</button>
            <button class="btn btn-secondary" style="width: 100%;" onclick="switchView('customer-view')">العودة للمنيو</button>
        </div>
    </div>

    <div id="admin-view" class="container" style="display: none;">
        <header>
            <h1 class="restaurant-title">لوحة التحكم ⚙️</h1>
            <button class="btn btn-secondary" onclick="switchView('customer-view')">العودة للمتجر</button>
        </header>

        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchAdminTab('tab-orders', this)">🔔 الطلبات</button>
            <button class="tab-btn" onclick="switchAdminTab('tab-menu', this)">🍔 المنيو</button>
            <button class="tab-btn" onclick="switchAdminTab('tab-settings', this)">🎨 الإعدادات</button>
        </div>

        <div id="tab-orders" class="admin-section active"><div id="admin-orders-list"></div></div>

        <div id="tab-menu" class="admin-section">
            <div class="admin-grid-desktop">
                <div class="admin-card">
                    <h3 id="form-title" style="margin-bottom: 15px; color: var(--primary-color); font-size: 16px;">إضافة طبق جديد</h3>
                    <input type="hidden" id="editing-item-id" value="">
                    
                    <div class="form-group">
                        <label class="form-label">صورة الطبق</label>
                        <input type="file" id="item-image" class="form-control" accept="image/*" style="padding: 8px;">
                    </div>
                    <div class="form-group"><label class="form-label">الاسم</label><input type="text" id="item-name" class="form-control" placeholder="اسم الطبق"></div>
                    <div class="form-group">
                        <label class="form-label">القسم</label>
                        <select id="item-category" class="form-control">
                            <option value="pizza">بيتزا</option>
                            <option value="burger">برغر</option>
                            <option value="sandwich">ساندويتشات</option>
                            <option value="drink">مشروبات</option>
                            <option value="extra">اضافات</option>
                            <option value="platter">اطباق رئيسية</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">السعر حسب الحجم (دج)</label>
                        <div class="row-inputs">
                            <input type="number" id="price-small" class="form-control" placeholder="صغير">
                            <input type="number" id="price-medium" class="form-control" placeholder="وسط">
                            <input type="number" id="price-large" class="form-control" placeholder="كبير">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">إضافات مدفوعة (اختياري)</label>
                        <div id="dynamic-paid-extras"></div>
                        <button class="btn btn-secondary" style="width: 100%; margin-top: 5px; font-size: 12px;" onclick="addPaidExtraField()">➕ إضافة خانة إضافة مدفوعة</button>
                    </div>

                    <div class="form-group">
                        <label class="form-label">مكونات للإزالة (مثل: بصل)</label>
                        <div id="dynamic-removable-extras"></div>
                        <button class="btn btn-secondary" style="width: 100%; margin-top: 5px; font-size: 12px;" onclick="addRemovableField()">➕ إضافة خانة مكون للإزالة</button>
                    </div>

                    <div style="display:flex; gap:8px; margin-top: 15px;">
                        <button class="btn" id="save-item-btn" style="flex: 2;" onclick="handleSaveItem()">💾 حفظ</button>
                        <button class="btn btn-secondary" id="cancel-edit-btn" style="flex: 1; display:none;" onclick="resetItemForm()">إلغاء</button>
                    </div>
                </div>

                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; font-size: 16px;">الأطباق الحالية</h3>
                    <div id="admin-items-list"></div>
                </div>
            </div>
        </div>

        <div id="tab-settings" class="admin-section">
            <div class="admin-grid-desktop">
                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: var(--primary-color); font-size: 16px;">إعدادات المتجر</h3>
                    <div class="form-group"><label class="form-label">اسم المطعم</label><input type="text" id="setting-name" class="form-control"></div>
                    <div class="form-group"><label class="form-label">سعر التوصيل (دج)</label><input type="number" id="setting-delivery" class="form-control"></div>
                    <div class="form-group"><label class="form-label">تغيير كلمة السر</label><input type="text" id="setting-password" class="form-control" placeholder="اتركه فارغاً للتخطي"></div>
                    <button class="btn" style="width: 100%; margin-top: 10px;" onclick="saveBasicSettings()">💾 حفظ</button>
                </div>

                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: var(--primary-color); font-size: 16px;">🎨 التحكم بالألوان</h3>
                    <div class="color-picker-group"><label>اللون الرئيسي</label><input type="color" id="color-primary"></div>
                    
                    <h4 style="margin: 10px 0 8px; color: var(--current-muted); font-size: 12px;">ألوان الوضع المظلم</h4>
                    <div class="color-picker-group"><label>لون الخلفية</label><input type="color" id="color-bg-dark"></div>
                    <div class="color-picker-group"><label>لون البطاقات</label><input type="color" id="color-surface-dark"></div>
                    
                    <h4 style="margin: 10px 0 8px; color: var(--current-muted); font-size: 12px;">ألوان الوضع الفاتح</h4>
                    <div class="color-picker-group"><label>لون الخلفية</label><input type="color" id="color-bg-light"></div>
                    <div class="color-picker-group"><label>لون البطاقات</label><input type="color" id="color-surface-light"></div>

                    <div style="display:flex; gap:8px; margin-top: 15px;">
                        <button class="btn" style="flex: 1;" onclick="saveColors()">تطبيق الألوان</button>
                        <button class="btn btn-secondary" style="flex: 1;" onclick="resetColorsToLuxury()">إعادة الافتراضي</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const categoryEmojis = { pizza: '🍕', burger: '🍔', sandwich: '🥪', drink: '🥤', extra: '🍟', platter: '🍽️' };
        
        let settings = JSON.parse(localStorage.getItem('restaurant_settings')) || {
            name: 'sadouki', deliveryFee: 200, password: 'admin'
        };

        const luxuryColors = {
            primary: '#d4af37', bgDark: '#0a0a0a', surfaceDark: '#151515', bgLight: '#f8f9fa', surfaceLight: '#ffffff'
        };
        let appColors = JSON.parse(localStorage.getItem('restaurant_colors')) || luxuryColors;
        
        let menuItems = JSON.parse(localStorage.getItem('restaurant_menu')) || [];
        let orders = JSON.parse(localStorage.getItem('restaurant_orders')) || [];
        let currentCart = [];
        let isLightMode = localStorage.getItem('theme_mode') === 'light';

        window.onload = function() {
            applyColorsToCSS();
            applySettings();
            if(isLightMode) document.body.classList.add('light-mode');
            renderCustomerMenu();
            resetItemForm();
        };

        function toggleTheme() {
            isLightMode = !isLightMode;
            document.body.classList.toggle('light-mode', isLightMode);
            localStorage.setItem('theme_mode', isLightMode ? 'light' : 'dark');
        }

        function applyColorsToCSS() {
            const root = document.documentElement;
            root.style.setProperty('--primary-color', appColors.primary);
            root.style.setProperty('--bg-dark', appColors.bgDark);
            root.style.setProperty('--surface-dark', appColors.surfaceDark);
            root.style.setProperty('--bg-light', appColors.bgLight);
            root.style.setProperty('--surface-light', appColors.surfaceLight);
        }

        function populateColorInputs() {
            document.getElementById('color-primary').value = appColors.primary;
            document.getElementById('color-bg-dark').value = appColors.bgDark;
            document.getElementById('color-surface-dark').value = appColors.surfaceDark;
            document.getElementById('color-bg-light').value = appColors.bgLight;
            document.getElementById('color-surface-light').value = appColors.surfaceLight;
        }

        function saveColors() {
            appColors = {
                primary: document.getElementById('color-primary').value,
                bgDark: document.getElementById('color-bg-dark').value,
                surfaceDark: document.getElementById('color-surface-dark').value,
                bgLight: document.getElementById('color-bg-light').value,
                surfaceLight: document.getElementById('color-surface-light').value
            };
            localStorage.setItem('restaurant_colors', JSON.stringify(appColors));
            applyColorsToCSS();
            showToast('تم تطبيق الألوان بنجاح', 'success');
        }

        function resetColorsToLuxury() {
            appColors = { ...luxuryColors };
            localStorage.setItem('restaurant_colors', JSON.stringify(appColors));
            populateColorInputs();
            applyColorsToCSS();
            showToast('تمت استعادة الألوان الافتراضية', 'success');
        }

        function applySettings() {
            document.getElementById('restaurant-main-title').innerText = settings.name;
        }

        function saveBasicSettings() {
            settings.name = document.getElementById('setting-name').value || 'sadouki';
            settings.deliveryFee = document.getElementById('setting-delivery').value || 0;
            const newPass = document.getElementById('setting-password').value;
            if(newPass.trim() !== '') settings.password = newPass;
            
            localStorage.setItem('restaurant_settings', JSON.stringify(settings));
            applySettings();
            showToast('تم حفظ الإعدادات', 'success');
            document.getElementById('setting-password').value = '';
        }

        const categoryNames = { pizza: 'البيتزا', burger: 'البرغر', sandwich: 'الساندويتشات', drink: 'المشروبات', extra: 'الإضافات الجانبية', platter: 'الأطباق الرئيسية' };

        function renderCustomerMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            if(menuItems.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:30px; font-size:14px; color:var(--current-muted);">القائمة قيد التجهيز...</div>';
                return;
            }

            const searchInput = document.getElementById('customer-search');
            const searchQuery = searchInput ? searchInput.value.trim().toLowerCase() : '';

            for (const cat in categoryNames) {
                const items = menuItems.filter(i => i.category === cat && i.name.toLowerCase().includes(searchQuery));
                if (items.length === 0) continue;

                const section = document.createElement('div');
                section.innerHTML = `<h2 style="margin: 25px 0 15px; font-size: 18px; color: var(--primary-color); border-bottom: 2px solid var(--border-color); padding-bottom: 8px;">${categoryNames[cat]}</h2>`;
                const grid = document.createElement('div');
                grid.className = 'items-grid';

                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'item-card';

                    const defaultSize = item.prices.medium ? 'medium' : (item.prices.small ? 'small' : 'large');
                    const defaultPrice = item.prices[defaultSize] || 0;
                    
                    let sizesHtml = '';
                    if(item.prices.small || item.prices.medium || item.prices.large) {
                        sizesHtml = `<div class="size-options">`;
                        if(item.prices.small) sizesHtml += `<div class="size-pill ${defaultSize==='small'?'active':''}" onclick="selectSize(${item.id}, 'small', this)">صغير</div>`;
                        if(item.prices.medium) sizesHtml += `<div class="size-pill ${defaultSize==='medium'?'active':''}" onclick="selectSize(${item.id}, 'medium', this)">وسط</div>`;
                        if(item.prices.large) sizesHtml += `<div class="size-pill ${defaultSize==='large'?'active':''}" onclick="selectSize(${item.id}, 'large', this)">كبير</div>`;
                        sizesHtml += `</div><input type="hidden" id="selected-size-${item.id}" value="${defaultSize}">`;
                    }

                    let extrasHtml = '';
                    if(item.paidExtras && item.paidExtras.length > 0) {
                        extrasHtml += `<div class="extras-section"><div class="extras-title">إضافات</div>`;
                        item.paidExtras.forEach((ex, idx) => {
                            extrasHtml += `<label class="check-item"><span>${ex.name} (+${ex.price} دج)</span> <input type="checkbox" class="ex-cb-${item.id}" data-price="${ex.price}" data-name="${ex.name}" onchange="updateLivePrice(${item.id})"></label>`;
                        });
                        extrasHtml += `</div>`;
                    }

                    if(item.removableExtras && item.removableExtras.length > 0) {
                        extrasHtml += `<div class="extras-section"><div class="extras-title">بدون..</div>`;
                        item.removableExtras.forEach((rem, idx) => {
                            extrasHtml += `<label class="check-item"><span>❌ ${rem}</span> <input type="checkbox" class="rem-cb-${item.id}" data-name="بدون ${rem}"></label>`;
                        });
                        extrasHtml += `</div>`;
                    }

                    let imageDisplayHtml = '';
                    if (item.image && item.image.trim() !== '') {
                        imageDisplayHtml = `<img src="${item.image}" class="item-image">`;
                    } else {
                        const fallbackEmoji = categoryEmojis[item.category] || '🍽️';
                        imageDisplayHtml = `<div class="item-image-placeholder">${fallbackEmoji}</div>`;
                    }

                    card.innerHTML = `
                        ${imageDisplayHtml}
                        <div class="item-content">
                            <div class="item-name">${item.name}</div>
                            ${sizesHtml}
                            ${extrasHtml}
                            <div class="item-footer">
                                <span class="price-tag" id="live-price-${item.id}">${defaultPrice} دج</span>
                                <button class="btn" onclick="addToCart(${item.id})">🛒 إضافة</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                section.appendChild(grid);
                container.appendChild(section);
            }
        }

        function selectSize(itemId, size, element) {
            const container = element.parentElement;
            container.querySelectorAll('.size-pill').forEach(p => p.classList.remove('active'));
            element.classList.add('active');
            document.getElementById(`selected-size-${itemId}`).value = size;
            updateLivePrice(itemId);
        }

        function updateLivePrice(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const size = document.getElementById(`selected-size-${itemId}`).value;
            let total = parseInt(item.prices[size]) || 0;
            document.querySelectorAll(`.ex-cb-${itemId}:checked`).forEach(cb => total += parseInt(cb.dataset.price));
            document.getElementById(`live-price-${itemId}`).innerText = total + ' دج';
        }

        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            const size = document.getElementById(`selected-size-${itemId}`) ? document.getElementById(`selected-size-${itemId}`).value : 'medium';
            const basePrice = parseInt(item.prices[size]) || 0;
            
            let selectedExtras = [];
            let extrasTotal = 0;
            document.querySelectorAll(`.ex-cb-${itemId}:checked`).forEach(cb => {
                selectedExtras.push(cb.dataset.name);
                extrasTotal += parseInt(cb.dataset.price);
            });
            
            document.querySelectorAll(`.rem-cb-${itemId}:checked`).forEach(cb => {
                selectedExtras.push(cb.dataset.name);
            });

            const sizeAr = size === 'small' ? 'صغير' : (size === 'medium' ? 'وسط' : 'كبير');

            currentCart.push({ itemId: item.id, name: item.name, size: sizeAr, extras: selectedExtras, price: basePrice + extrasTotal });
            updateCartUI();
            showToast('تمت الإضافة للسلة', 'success');
        }

        function updateCartUI() {
            const cartBtn = document.getElementById('floating-cart');
            if(currentCart.length > 0) {
                cartBtn.style.display = 'flex';
                document.getElementById('cart-count').innerText = currentCart.length;
                let total = currentCart.reduce((sum, item) => sum + item.price, 0);
                document.getElementById('cart-total-float').innerText = total + ' دج';
            } else {
                cartBtn.style.display = 'none';
                closeModal('cart-modal');
            }
        }

        function setOrderType(type) {
            document.getElementById('order-type').value = type;
            const devBtn = document.getElementById('type-delivery');
            const picBtn = document.getElementById('type-pickup');
            const addrGroup = document.getElementById('order-address-group');
            
            if(type === 'delivery') {
                devBtn.classList.remove('btn-secondary');
                picBtn.classList.add('btn-secondary');
                if (addrGroup) addrGroup.style.display = 'block';
            } else {
                picBtn.classList.remove('btn-secondary');
                devBtn.classList.add('btn-secondary');
                if (addrGroup) addrGroup.style.display = 'none';
            }
            
            const subtotal = currentCart.reduce((sum, item) => sum + item.price, 0);
            const deliveryFee = type === 'delivery' ? parseInt(settings.deliveryFee) : 0;
            
            document.getElementById('cart-delivery').innerText = deliveryFee + ' دج';
            document.getElementById('cart-final-total').innerText = (subtotal + deliveryFee) + ' دج';
        }

        function openCartModal() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = '';
            let subtotal = 0;

            currentCart.forEach((item, index) => {
                subtotal += item.price;
                let extrasText = item.extras.length > 0 ? `<div style="font-size:11px; color:var(--danger-color); margin-top:3px;">${item.extras.join('، ')}</div>` : '';
                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; background: var(--input-bg); padding:10px; border-radius:10px; margin-bottom:8px;">
                        <div>
                            <div style="font-weight:bold; font-size:14px;">${item.name} <span style="color:var(--primary-color); font-size:11px">(${item.size})</span></div>
                            ${extrasText}
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span style="font-weight:bold; font-size:13px; color:var(--primary-color);">${item.price} دج</span>
                            <button onclick="removeFromCart(${index})" style="background:none; border:none; color:var(--danger-color); font-size:20px; cursor:pointer;">×</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('cart-subtotal').innerText = subtotal + ' دج';
            document.getElementById('cart-modal').style.display = 'flex';
            
            const currentType = document.getElementById('order-type') ? document.getElementById('order-type').value : 'delivery';
            setOrderType(currentType);
        }

        function removeFromCart(index) {
            currentCart.splice(index, 1);
            updateCartUI();
            if(currentCart.length > 0) openCartModal();
        }

        function submitOrder() {
            const name = document.getElementById('order-name').value;
            const phone = document.getElementById('order-phone').value;
            const orderType = document.getElementById('order-type').value;
            const address = orderType === 'delivery' ? document.getElementById('order-address').value : 'استلام من المتجر';

            if(!name || !phone || (orderType === 'delivery' && !address)) { showToast('الرجاء تعبئة كل المعلومات', 'error'); return; }

            const subtotal = currentCart.reduce((sum, item) => sum + item.price, 0);
            const deliveryFee = orderType === 'delivery' ? parseInt(settings.deliveryFee) : 0;
            
            orders.unshift({
                id: Date.now(), date: new Date().toLocaleString('ar-DZ'),
                customer: { name, phone, address }, items: [...currentCart],
                subtotal: subtotal, deliveryFee: deliveryFee,
                total: subtotal + deliveryFee, status: 'pending',
                type: orderType === 'delivery' ? 'توصيل 🛵' : 'من المتجر 🏪'
            });

            localStorage.setItem('restaurant_orders', JSON.stringify(orders));
            currentCart = []; updateCartUI(); closeModal('cart-modal');
            showToast('تم إرسال طلبك بنجاح!', 'success');
            document.getElementById('order-name').value = ''; document.getElementById('order-phone').value = ''; document.getElementById('order-address').value = '';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function switchView(viewId) {
            document.getElementById('customer-view').style.display = 'none';
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';

            if(viewId === 'admin-view') {
                document.getElementById('setting-name').value = settings.name;
                document.getElementById('setting-delivery').value = settings.deliveryFee;
                populateColorInputs();
                renderAdminItems();
                renderOrders();
            } else if (viewId === 'customer-view') {
                renderCustomerMenu();
            }
        }

        function checkLogin() {
            if(document.getElementById('login-password').value === settings.password) {
                document.getElementById('login-password').value = '';
                switchView('admin-view');
            } else { showToast('كلمة المرور خاطئة', 'error'); }
        }

        function switchAdminTab(tabId, btnElement) {
            document.querySelectorAll('.admin-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        function renderOrders() {
            const container = document.getElementById('admin-orders-list');
            container.innerHTML = '';
            if(orders.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 20px; font-size:13px; color: var(--current-muted);">لا توجد طلبات حالياً</div>'; return; }

            orders.forEach(order => {
                let itemsHtml = order.items.map(i => `<li><b>${i.name} (${i.size})</b> ${i.extras.length > 0 ? '<br><span style="color:var(--danger-color);font-size:11px;">'+i.extras.join('، ')+'</span>' : ''} - <b>${i.price} دج</b></li>`).join('');
                let bgStat = order.status === 'pending' ? 'var(--danger-color)' : 'var(--success-color)';
                let orderTypeLabel = order.type || 'توصيل 🛵';
                
                container.innerHTML += `
                    <div class="admin-card" style="padding: 15px; opacity: ${order.status === 'done' ? '0.6' : '1'}">
                        <div style="display:flex; justify-content:space-between; border-bottom:1px solid var(--border-color); padding-bottom:8px; margin-bottom:10px;">
                            <div><strong style="font-size:15px; color:var(--primary-color)">👤 ${order.customer.name}</strong><br><span style="font-size:11px; color:var(--current-muted)">🕒 ${order.date}</span></div>
                            <div><span style="background:${bgStat}; color:white; padding:3px 8px; border-radius:6px; font-size:11px;">${order.status === 'pending' ? 'انتظار' : 'مكتمل'}</span></div>
                        </div>
                        <div style="font-size:13px; line-height:1.6;">
                            <div>📞 <b>الهاتف:</b> ${order.customer.phone}</div>
                            <div>📦 <b>طريقة الاستلام:</b> ${orderTypeLabel}</div>
                            <div>📍 <b>العنوان:</b> ${order.customer.address}</div>
                            <ul style="margin:8px 15px 8px 0; font-size:12px;">${itemsHtml}</ul>
                        </div>
                        <div style="display:flex; justify-content:space-between; align-items:center; border-top: 1px solid var(--border-color); padding-top:10px; margin-top:8px;">
                            <div style="font-size:15px; font-weight:bold;">الإجمالي: <span style="color:var(--primary-color)">${order.total} دج</span></div>
                            <div style="display:flex; gap:6px;">
                                ${order.status === 'pending' ? `<button class="btn btn-success" style="padding: 6px 10px; font-size:11px;" onclick="markOrderDone(${order.id})">✔ اكتمل</button>` : ''}
                                <button class="btn btn-danger" style="padding: 6px 10px; font-size:11px;" onclick="deleteOrder(${order.id})">🗑️ حذف</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
        function markOrderDone(id) { orders.find(o => o.id === id).status = 'done'; localStorage.setItem('restaurant_orders', JSON.stringify(orders)); renderOrders(); }
        function deleteOrder(id) { if(confirm('متأكد من حذف الطلب؟')) { orders = orders.filter(o => o.id !== id); localStorage.setItem('restaurant_orders', JSON.stringify(orders)); renderOrders(); } }

        function addPaidExtraField(name = '', price = '') {
            const container = document.getElementById('dynamic-paid-extras');
            const div = document.createElement('div');
            div.className = 'row-inputs';
            div.innerHTML = `<input type="text" class="form-control p-name" placeholder="إضافة (مثال: جبن)" value="${name}" style="padding:8px; font-size:12px;"><input type="number" class="form-control p-price" placeholder="السعر" value="${price}" style="padding:8px; font-size:12px;"> <button class="btn btn-danger" style="padding:8px;" onclick="this.parentElement.remove()">X</button>`;
            container.appendChild(div);
        }

        function addRemovableField(name = '') {
            const container = document.getElementById('dynamic-removable-extras');
            const div = document.createElement('div');
            div.className = 'row-inputs';
            div.innerHTML = `<input type="text" class="form-control r-name" placeholder="مكون (مثال: بصل)" value="${name}" style="padding:8px; font-size:12px;"> <button class="btn btn-danger" style="padding:8px;" onclick="this.parentElement.remove()">X</button>`;
            container.appendChild(div);
        }

        function resetItemForm() {
            document.getElementById('editing-item-id').value = '';
            document.getElementById('form-title').innerText = 'إضافة طبق جديد';
            document.getElementById('save-item-btn').innerText = '➕ إضافة';
            document.getElementById('cancel-edit-btn').style.display = 'none';
            document.getElementById('item-name').value = '';
            document.getElementById('price-small').value = ''; document.getElementById('price-medium').value = ''; document.getElementById('price-large').value = '';
            document.getElementById('item-image').value = '';
            
            document.getElementById('dynamic-paid-extras').innerHTML = '';
            document.getElementById('dynamic-removable-extras').innerHTML = '';
            addPaidExtraField();
            addRemovableField();
        }

        function editMenuItem(id) {
            const item = menuItems.find(i => i.id === id);
            if(!item) return;

            document.getElementById('editing-item-id').value = item.id;
            document.getElementById('form-title').innerText = '✏️ تعديل: ' + item.name;
            document.getElementById('save-item-btn').innerText = '💾 تحديث';
            document.getElementById('cancel-edit-btn').style.display = 'block';

            document.getElementById('item-name').value = item.name;
            document.getElementById('item-category').value = item.category;
            document.getElementById('price-small').value = item.prices.small || '';
            document.getElementById('price-medium').value = item.prices.medium || '';
            document.getElementById('price-large').value = item.prices.large || '';
            
            document.getElementById('dynamic-paid-extras').innerHTML = '';
            if(item.paidExtras && item.paidExtras.length > 0) {
                item.paidExtras.forEach(ex => addPaidExtraField(ex.name, ex.price));
            } else { addPaidExtraField(); }

            document.getElementById('dynamic-removable-extras').innerHTML = '';
            if(item.removableExtras && item.removableExtras.length > 0) {
                item.removableExtras.forEach(rem => addRemovableField(rem));
            } else { addRemovableField(); }

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function handleSaveItem() {
            const fileInput = document.getElementById('item-image');
            const editingId = document.getElementById('editing-item-id').value;

            if (fileInput.files && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) { processItemSave(e.target.result, editingId); };
                reader.readAsDataURL(fileInput.files[0]);
            } else { 
                processItemSave(null, editingId); 
            }
        }

        function processItemSave(imageData, editingId) {
            const name = document.getElementById('item-name').value;
            if(!name) { showToast('أدخل اسم الطبق', 'error'); return; }

            let paidExtras = [];
            document.querySelectorAll('#dynamic-paid-extras .row-inputs').forEach(row => {
                const pName = row.querySelector('.p-name');
                const pPrice = row.querySelector('.p-price');
                if(pName && pPrice && pName.value.trim() !== '') {
                    paidExtras.push({ name: pName.value.trim(), price: parseInt(pPrice.value) || 0 });
                }
            });

            let removableExtras = [];
            document.querySelectorAll('#dynamic-removable-extras .r-name').forEach(input => {
                if(input.value.trim() !== '') removableExtras.push(input.value.trim());
            });

            const itemData = {
                id: editingId ? parseInt(editingId) : Date.now(),
                name: name, category: document.getElementById('item-category').value,
                prices: {
                    small: document.getElementById('price-small').value || null,
                    medium: document.getElementById('price-medium').value || null,
                    large: document.getElementById('price-large').value || null
                },
                paidExtras: paidExtras,
                removableExtras: removableExtras
            };

            if (editingId) {
                const existingItemIndex = menuItems.findIndex(i => i.id == editingId);
                if (imageData) itemData.image = imageData;
                else itemData.image = menuItems[existingItemIndex].image;
                
                menuItems[existingItemIndex] = itemData;
                showToast('تم التحديث', 'success');
            } else {
                itemData.image = imageData || '';
                menuItems.push(itemData);
                showToast('تمت الإضافة', 'success');
            }

            try {
                localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
                renderAdminItems();
                resetItemForm();
            } catch (e) {
                showToast('الصورة كبيرة جداً', 'error');
            }
        }

        function renderAdminItems() {
            const list = document.getElementById('admin-items-list');
            list.innerHTML = '';
            if(menuItems.length === 0) { list.innerHTML = '<p style="color:var(--current-muted); text-align:center; font-size:13px;">لا توجد أطباق.</p>'; return; }
            
            menuItems.forEach(item => {
                let adminImageHtml = '';
                if (item.image && item.image.trim() !== '') {
                    adminImageHtml = `<img src="${item.image}" style="width:50px; height:50px; border-radius:10px; object-fit:cover;">`;
                } else {
                    const fallbackEmoji = categoryEmojis[item.category] || '🍽️';
                    adminImageHtml = `<div style="width:50px; height:50px; border-radius:10px; background:var(--input-bg); display:flex; align-items:center; justify-content:center; font-size:24px;">${fallbackEmoji}</div>`;
                }

                list.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--input-bg); margin-bottom:8px; border-radius:12px; border: 1px solid var(--border-color);">
                        <div style="display:flex; align-items:center; gap:10px;">
                            ${adminImageHtml}
                            <div><b style="font-size:14px;">${item.name}</b> <div style="font-size:11px; color:var(--primary-color)">${categoryNames[item.category]}</div></div>
                        </div>
                        <div style="display:flex; gap:6px;">
                            <button class="btn btn-secondary" style="padding: 6px 10px; font-size:11px;" onclick="editMenuItem(${item.id})">✏️</button>
                            <button class="btn btn-danger" style="padding: 6px 10px; font-size:11px;" onclick="deleteMenuItem(${item.id})">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function deleteMenuItem(id) {
            if(confirm('حذف هذا الطبق؟')) {
                menuItems = menuItems.filter(i => i.id !== id);
                localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
                renderAdminItems();
            }
        }

        function showToast(msg, type) {
            const toast = document.getElementById('toast');
            toast.innerText = msg; toast.className = 'show';
            toast.style.borderColor = type === 'error' ? 'var(--danger-color)' : 'var(--primary-color)';
            setTimeout(() => toast.className = toast.className.replace('show', ''), 3000);
        }
    </script>
</body>
</html>
